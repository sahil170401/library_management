<h1>My Library Loans</h1>
<table class="table table-bordered">
	<thead>
		<tr>
			<th>Transaction</th>
			<th>Item</th>
			<th>Copy</th>
			<th>Issue Date</th>
			<th>Due Date</th>
			<th>Status</th>
		</tr>
	</thead>
	<tbody>
		{% for row in loans %}
		<tr>
			<td>{{ row.name }}</td>
			<td>{{ row.item }}</td>
			<td>{{ row.copy }}</td>
			<td>{{ row.issue_date }}</td>
			<td>{{ row.due_date }}</td>
			<td>{{ row.status }}</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
